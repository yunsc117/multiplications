<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예라만을 위한 퍼센트 계산연습</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,600;0,700;1,500;1,600&family=Baloo+2:wght@700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606;
      --card: #FFFFFF;
      --gold: #C8A951;
      --gold-bright: #E0C878;
      --cream: #F5ECD7;
      --dark: #0A0A0A;
      --text-card: #0A0A0A;
      --muted: #9A8E80;
      --c1: #C8A951;
      --c2: #B08030;
      --c3: #D4B860;
      --c4: #9B7530;
      --c5: #DBBF50;
      --correct-bg: #F0FDF4;
      --correct-border: #22C55E;
      --wrong-bg: #FFF1F0;
      --wrong-border: #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 0 0 40px;
    }

    /* Chanel quilted diamond texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(45deg, rgba(200,169,81,0.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(200,169,81,0.04) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(200,169,81,0.04) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(200,169,81,0.04) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Gold Ticker ── */
    .brand-ticker {
      position: relative;
      z-index: 2;
      background: var(--gold);
      overflow: hidden;
      padding: 8px 0;
    }

    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: ticker 22s linear infinite;
    }

    .ticker-track span {
      font-family: 'Cormorant Garant', serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      color: #1A1209;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .ticker-track .sep {
      color: rgba(26,18,9,0.4);
      letter-spacing: 0;
      padding: 0 4px;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 26px 16px 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeDown 0.7s ease both;
    }

    /* CC Logo */
    .cc-logo {
      width: 72px;
      height: 50px;
      margin: 0 auto 8px;
      color: var(--cream);
    }

    .cc-logo svg { width: 100%; height: 100%; }

    .header-brand-name {
      font-family: 'Cormorant Garant', serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.55em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .header-line {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 8px auto 12px;
    }

    .header h1 {
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 1.7rem;
      font-weight: 500;
      color: var(--cream);
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .header-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 0.06em;
    }

    /* ── Score Banner ── */
    .score-banner {
      display: none;
      text-align: center;
      background: #0F0F0F;
      border: 1px solid rgba(200,169,81,0.35);
      border-radius: 2px;
      padding: 18px 20px;
      margin-bottom: 14px;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .score-icon  { font-size: 2.2rem; display: block; margin-bottom: 4px; }

    .score-main {
      font-family: 'Cormorant Garant', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .score-msg {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Question Cards ── */
    .questions { display: flex; flex-direction: column; gap: 10px; }

    .q-card {
      background: var(--card);
      border-radius: 2px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-left: 4px solid transparent;
      opacity: 0;
      transform: translateY(8px);
      animation: slideUp 0.4s ease forwards;
      transition: box-shadow 0.2s;
    }

    .q-card:hover { box-shadow: 0 4px 20px rgba(200,169,81,0.12); }

    .q-card:nth-child(1) { border-left-color: var(--c1); animation-delay: 0.06s; }
    .q-card:nth-child(2) { border-left-color: var(--c2); animation-delay: 0.14s; }
    .q-card:nth-child(3) { border-left-color: var(--c3); animation-delay: 0.22s; }
    .q-card:nth-child(4) { border-left-color: var(--c4); animation-delay: 0.30s; }
    .q-card:nth-child(5) { border-left-color: var(--c5); animation-delay: 0.38s; }

    .q-num {
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: 1.65rem;
      font-weight: 600;
      min-width: 26px;
      text-align: center;
      line-height: 1;
      color: var(--gold);
    }

    .q-body { flex: 1; min-width: 0; }

    .q-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .q-text {
      flex: 1;
      font-size: 1.18rem;
      font-weight: 700;
      color: var(--text-card);
      line-height: 1.3;
      white-space: nowrap;
    }

    .q-text .bold {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 1.28rem;
    }

    .q-input {
      width: 92px;
      height: 46px;
      border: 1.5px solid #D8D0C0;
      border-radius: 2px;
      font-size: 1.3rem;
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      text-align: center;
      color: var(--text-card);
      background: #FAFAF6;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.12s;
      -moz-appearance: textfield;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .q-input::-webkit-inner-spin-button,
    .q-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .q-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(200,169,81,0.18);
      transform: scale(1.03);
    }

    .q-input:disabled { opacity: 0.7; cursor: not-allowed; }

    .q-result-icon {
      font-size: 1.5rem;
      display: none;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .q-correct-label {
      display: none;
      font-size: 0.82rem;
      color: var(--wrong-border);
      font-weight: 600;
      margin-top: 4px;
    }

    .q-card.correct { background: var(--correct-bg); border-left-color: var(--correct-border) !important; }
    .q-card.wrong   { background: var(--wrong-bg);   border-left-color: var(--wrong-border)   !important; }
    .q-card.wrong .q-correct-label { display: block; }

    /* ── Buttons ── */
    .btn-row {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      animation: fadeUp 0.5s 0.52s ease both;
    }

    .btn {
      padding: 14px 44px;
      font-size: 0.82rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background 0.18s;
      letter-spacing: 0.12em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active:not(:disabled) { transform: scale(0.97) !important; }

    .btn-submit {
      background: var(--cream);
      color: var(--dark);
      border: 1px solid var(--cream);
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #FFF9EE;
      box-shadow: 0 4px 16px rgba(245,236,215,0.2);
    }

    .btn-submit:disabled {
      background: #2A2520;
      border-color: #2A2520;
      color: #6A6258;
      cursor: not-allowed;
    }

    .btn-retry {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      display: none;
    }

    .btn-retry:hover {
      transform: translateY(-1px);
      background: rgba(200,169,81,0.08);
    }

    /* ── Confetti ── */
    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

    /* ── Keyframes ── */
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.38s ease; }

    /* ── Mobile: iPhone 16 한 화면 ── */
    @media (max-width: 580px) {
      .container { padding: 14px 12px 0; }

      .header { margin-bottom: 10px; }
      .header-sub { display: none; }
      .cc-logo { width: 50px; height: 34px; margin-bottom: 5px; }
      .header-brand-name { font-size: 0.55rem; letter-spacing: 0.45em; }
      .header-line { margin: 5px auto 8px; }
      .header h1 { font-size: 1.22rem; }
      .header h1 br { display: none; }

      .score-banner { padding: 12px 14px; margin-bottom: 10px; }
      .score-icon  { font-size: 1.9rem; margin-bottom: 2px; }
      .score-main  { font-size: 1.5rem; }
      .score-msg   { font-size: 0.8rem; margin-top: 2px; }

      .questions { gap: 7px; }

      .q-card { padding: 11px 13px; gap: 8px; border-left-width: 3px; }

      .q-num { font-size: 1.3rem; min-width: 20px; }
      .q-row { gap: 8px; }

      /* 폰트 크게: 1.05rem / 1.15rem, iOS 확대 방지 16px 이상 */
      .q-text { font-size: 1.05rem; }
      .q-text .bold { font-size: 1.15rem; }

      .q-input { width: 78px; height: 42px; font-size: 16px; }
      .q-input:focus { transform: none; }

      .q-result-icon { font-size: 1.25rem; }
      .q-correct-label { font-size: 0.77rem; margin-top: 3px; }

      .btn-row { flex-direction: column; gap: 8px; margin-top: 12px; }
      .btn { width: 100%; padding: 13px 20px; font-size: 0.82rem; text-align: center; }
    }

    @media (max-width: 360px) {
      .header h1 { font-size: 1.08rem; }
      .q-text { font-size: 0.95rem; }
      .q-text .bold { font-size: 1.05rem; }
      .q-input { width: 70px; }
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <!-- Gold CHANEL · PARIS ticker -->
  <div class="brand-ticker" aria-hidden="true">
    <div class="ticker-track">
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <!-- 루프용 복제 -->
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
      <span>CHANEL</span><span class="sep">·</span><span>PARIS</span><span class="sep">·</span>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <!-- Chanel interlocking CC logo -->
      <div class="cc-logo">
        <svg viewBox="0 0 90 58" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <path id="lc" d="M32 3C14 3 1 14 1 29C1 44 14 55 32 55C42 55 51 51 57 45L57 36C52 42 43 47 32 47C19 47 9 39 9 29C9 19 19 11 32 11C43 11 52 16 57 22L57 13C51 7 42 3 32 3Z"/>
            <path id="rc" d="M58 3C76 3 89 14 89 29C89 44 76 55 58 55C48 55 39 51 33 45L33 36C38 42 47 47 58 47C71 47 81 39 81 29C81 19 71 11 58 11C47 11 38 16 33 22L33 13C39 7 48 3 58 3Z"/>
            <clipPath id="bot"><rect x="0" y="29" width="90" height="29"/></clipPath>
          </defs>
          <!-- left C base -->
          <use href="#lc" fill="currentColor"/>
          <!-- right C on top -->
          <use href="#rc" fill="currentColor"/>
          <!-- left C bottom re-layered on top for interlocking -->
          <use href="#lc" fill="currentColor" clip-path="url(#bot)"/>
        </svg>
      </div>
      <div class="header-brand-name">Chanel</div>
      <div class="header-line"></div>
      <h1>예라만을 위한<br>퍼센트 계산연습</h1>
      <p class="header-sub">5문제를 모두 풀고 제출해 보세요</p>
    </div>

    <div id="score-banner" class="score-banner" style="display:none">
      <span id="score-icon" class="score-icon"></span>
      <div id="score-main" class="score-main"></div>
      <div id="score-msg"  class="score-msg"></div>
    </div>

    <div id="questions" class="questions"></div>

    <div class="btn-row">
      <button id="btn-submit" class="btn btn-submit" disabled>제출하기</button>
      <button id="btn-retry"  class="btn btn-retry">다시 풀기</button>
    </div>
  </div>

  <script>
    function buildPool() {
      const pool = [];
      for (let n = 10; n <= 100; n += 5)
        for (let p = 5; p <= 80; p += 5) {
          const ans = n * p / 100;
          if (Number.isInteger(ans) && ans >= 2) pool.push({ n, p, ans });
        }
      return pool;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let problems = [], submitted = false;

    function render() {
      problems  = shuffle(buildPool()).slice(0, 5);
      submitted = false;
      const wrap = document.getElementById('questions');
      wrap.innerHTML = '';
      problems.forEach(({ n, p }, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `card-${i}`;
        card.innerHTML = `
          <div class="q-num">${i + 1}</div>
          <div class="q-body">
            <div class="q-row">
              <div class="q-text"><span class="bold">${n}</span>의 <span class="bold">${p}%</span>는?</div>
              <input id="inp-${i}" class="q-input" type="number"
                     inputmode="decimal" min="0" step="any" placeholder="?" autocomplete="off"/>
              <span id="icon-${i}" class="q-result-icon"></span>
            </div>
            <div id="lbl-${i}" class="q-correct-label">정답: ${problems[i].ans}</div>
          </div>`;
        wrap.appendChild(card);
        const inp = document.getElementById(`inp-${i}`);
        inp.addEventListener('input', checkFill);
        inp.addEventListener('keydown', e => {
          if (e.key !== 'Enter') return;
          e.preventDefault();
          const next = document.getElementById(`inp-${i + 1}`);
          if (next) next.focus(); else if (allFilled()) grade();
        });
      });
      document.getElementById('score-banner').style.display = 'none';
      document.getElementById('btn-submit').style.display = '';
      document.getElementById('btn-submit').disabled = true;
      document.getElementById('btn-retry').style.display = 'none';
      document.getElementById('inp-0')?.focus();
    }

    const allFilled = () => problems.every((_, i) => document.getElementById(`inp-${i}`).value.trim() !== '');
    const checkFill = () => { document.getElementById('btn-submit').disabled = !allFilled(); };

    function grade() {
      if (submitted) return;
      submitted = true;
      let correct = 0;
      problems.forEach(({ ans }, i) => {
        const inp  = document.getElementById(`inp-${i}`);
        const card = document.getElementById(`card-${i}`);
        const icon = document.getElementById(`icon-${i}`);
        inp.disabled = true;
        icon.style.display = 'inline';
        if (parseFloat(inp.value) === ans) {
          correct++; card.classList.add('correct'); icon.textContent = '✅';
        } else {
          card.classList.add('wrong'); icon.textContent = '❌';
          card.classList.add('shake');
          card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
        }
      });
      const MSGS = [
        { icon: '😢', msg: '포기하지 말고 다시 도전해요! 💪' },
        { icon: '🤔', msg: '한 문제 맞았어요! 조금만 더 힘내요!' },
        { icon: '😊', msg: '두 문제! 계속 연습하면 늘 거예요!' },
        { icon: '😄', msg: '절반 넘었어요! 꽤 잘하는걸요?' },
        { icon: '🎉', msg: '거의 다 맞았어요! 정말 대단해요!' },
        { icon: '🏆', msg: '5개 모두 정답! 퍼센트 천재예요! 🎊' },
      ];
      document.getElementById('score-icon').textContent = MSGS[correct].icon;
      document.getElementById('score-main').textContent = `${correct} / 5 정답 (${correct * 20}점)`;
      document.getElementById('score-msg').textContent  = MSGS[correct].msg;
      document.getElementById('score-banner').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      document.getElementById('btn-submit').style.display = 'none';
      document.getElementById('btn-retry').style.display  = '';
      if (correct === 5) launchConfetti();
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const COLORS = ['#C8A951','#E0C878','#F5ECD7','#FFFFFF','#9B7530','#D4B860'];
      const pieces = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width, y: -20 - Math.random() * 100,
        w: 5 + Math.random() * 6, h: 3 + Math.random() * 4,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vy: 2 + Math.random() * 2, vx: (Math.random() - 0.5) * 1.6,
        angle: Math.random() * Math.PI * 2, spin: (Math.random() - 0.5) * 0.1,
      }));
      let raf;
      const draw = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        for (const p of pieces) {
          if (p.y < canvas.height + 20) {
            alive = true; p.y += p.vy; p.x += p.vx + Math.sin(p.angle); p.angle += p.spin;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
            ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.restore();
          }
        }
        if (alive) raf = requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      };
      raf = requestAnimationFrame(draw);
      setTimeout(() => { cancelAnimationFrame(raf); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 5000);
    }

    document.getElementById('btn-submit').addEventListener('click', grade);
    document.getElementById('btn-retry').addEventListener('click', () => { render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    render();
  </script>
</body>
</html>
